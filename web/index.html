<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTS - Text to Speech</title>
    <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
    <style>
        body {
            font-family: system-ui;
            background: #0d1117;
            color: #c9d1d9;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: #58a6ff;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 1.5rem;
            margin: 1.5rem 0;
        }

        textarea,
        select,
        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: #c9d1d9;
            font-size: 1rem;
        }

        button {
            background: #238636;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover:not(:disabled) {
            background: #2ea043;
        }

        button:disabled {
            background: #30363d;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .progress-container {
            width: 100%;
            background: #21262d;
            border-radius: 8px;
            height: 8px;
            margin: 1rem 0;
            overflow: hidden;
            display: none;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #238636, #2ea043);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 8px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        .progress-text {
            font-size: 0.9rem;
            color: #8b949e;
            margin-top: 0.5rem;
            display: none;
        }

        .progress-text.active {
            display: block;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.5rem;
        }

        .status-ready {
            background: #3fb950;
            box-shadow: 0 0 8px #3fb950;
        }

        .status-processing {
            background: #f0883e;
            box-shadow: 0 0 8px #f0883e;
            animation: blink 1s infinite;
        }

        .status-checking {
            background: #8b949e;
            box-shadow: 0 0 8px #8b949e;
            animation: rotate 2s linear infinite;
        }

        .status-offline {
            background: #da3633;
            box-shadow: 0 0 8px #da3633;
            animation: blink 1s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .result {
            margin-top: 1rem;
            padding: 1rem;
            background: #21262d;
            border-radius: 8px;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
            font-family: inherit;
        }
    </style>
</head>

        let currentLang = 'en';

        function changeLanguage(lang) {
            currentLang = lang;
            const t = translations[lang] || translations['en'];

            // Save language preference to localStorage
            localStorage.setItem('preferredLanguage', lang);

            // Update the dropdown to match
            const languageSelect = document.getElementById('interfaceLanguage');
            if (languageSelect) {
                languageSelect.value = lang;
            }

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.textContent = t[key];
            });

            document.getElementById('text').placeholder = t.placeholder;

            const textArea = document.getElementById('text');
            const isDefaultText = Object.values(translations).some(trans => textArea.value === trans.defaultText);
            if (isDefaultText || textArea.value === "") {
                textArea.value = t.defaultText;
            }
        }

        // Load saved language preference or default to English
        const savedLang = localStorage.getItem('preferredLanguage') || 'en';
        changeLanguage(savedLang);

        const getTTSUrl = () => {
            const hostname = window.location.hostname;
            return `http://${hostname}:9876/api/tts`;
        };

        function updateProgress(percent, text) {
            const progressBar = document.getElementById('ttsProgressBar');
            const progressText = document.getElementById('ttsProgressText');
            const progressContainer = document.getElementById('ttsProgress');

            if (percent > 0) {
                progressContainer.classList.add('active');
                progressText.classList.add('active');
                progressBar.style.width = percent + '%';
                progressText.textContent = text;
            } else {
                progressContainer.classList.remove('active');
                progressText.classList.remove('active');
            }
        }

        function setStatus(processing) {
            const t = translations[currentLang];
            const status = document.getElementById('ttsStatus');
            const button = document.getElementById('ttsButton');

            if (processing === 'offline') {
                status.className = 'status-indicator status-offline';
                button.disabled = true;
                if (!button.dataset.originalText) {
                    button.dataset.originalText = button.textContent;
                }
                button.textContent = t.btnWaiting;
            } else if (processing === 'checking') {
                status.className = 'status-indicator status-checking';
                button.disabled = true;
                if (!button.dataset.originalText) {
                    button.dataset.originalText = button.textContent;
                }
                button.textContent = t.btnWaiting;
            } else if (processing) {
                status.className = 'status-indicator status-processing';
                button.disabled = true;
                if (button.dataset.originalText) {
                    button.textContent = button.dataset.originalText;
                }
            } else {
                status.className = 'status-indicator status-ready';
                button.disabled = false;
                if (button.dataset.originalText) {
                    button.textContent = button.dataset.originalText;
                }
            }
        }

        async function checkServiceHealth() {
            setStatus('checking');
            updateProgress(0, 'Checking service status...');

            // Increased retries for initial model download (~2GB can take 5-10 minutes)
            const maxRetries = 120; // Try for up to 120 times = 10 minutes
            const retryDelay = 5000; // 5 seconds between retries

            for (let i = 0; i < maxRetries; i++) {
                try {
                    // Check the /health endpoint to verify model is loaded
                    const resp = await fetch(getTTSUrl().replace('/api/tts', '/health'), {
                        method: 'GET',
                        mode: 'cors',
                        signal: AbortSignal.timeout(3000)
                    });

                    if (resp.ok) {
                        // Verify the response indicates the model is loaded
                        const data = await resp.json();
                        if (data.status === 'healthy' && data.model_loaded) {
                            console.log('[TTS] Service is healthy and ready');
                            updateProgress(0, ''); // Clear progress
                            setStatus(false); // Service is ready - turn green
                            return true;
                        } else {
                            console.debug(`[TTS] Service responded but not fully ready: ${JSON.stringify(data)}`);
                        }
                    } else if (resp.status === 503) {
                        // Service unavailable - model downloading/loading
                        try {
                            const errorData = await resp.json();
                            const progress = errorData.detail?.progress || 0;
                            const message = errorData.detail?.message || 'Loading model...';
                            console.log(`[TTS] ${message} (${progress}%) - attempt ${i + 1}/${maxRetries}`);
                            updateProgress(progress, message);
                            setStatus('checking');
                        } catch (e) {
                            // Couldn't parse error details, use generic message
                            console.debug(`[TTS] Service initializing... (${i + 1}/${maxRetries})`);
                            updateProgress(Math.min((i / maxRetries) * 100, 90), 'Service initializing...');
                        }
                    } else if (resp.status === 500) {
                        // Server error
                        try {
                            const errorData = await resp.json();
                            const message = errorData.detail?.message || 'Server error occurred';
                            console.error(`[TTS] Error: ${message}`);
                            updateProgress(0, `Error: ${message}`);
                            setStatus('offline');
                        } catch (e) {
                            console.error(`[TTS] Server error (500)`);
                        }
                    }
                } catch (e) {
                    // Service not ready yet, will retry
                    // CORS errors are expected during startup and can be safely ignored
                    console.debug(`[TTS] Service not responding, retrying... (${i + 1}/${maxRetries})`);
                    updateProgress(Math.min((i / maxRetries) * 50, 45), 'Waiting for service to start...');
                }

                if (i < maxRetries - 1) {
                    await new Promise(resolve => setTimeout(resolve, retryDelay));
                }
            }

            // After all retries, service is still offline - keep red
            updateProgress(0, 'Service unavailable - please check logs');
            setStatus('offline');
            return false;
        }

        async function convertWavToMp3(wavBlob) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const arrayBuffer = await wavBlob.arrayBuffer();
            const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

            const channels = audioBuffer.numberOfChannels;
            const sampleRate = audioBuffer.sampleRate;
            const samples = audioBuffer.getChannelData(0); // Get left channel

            // Convert float samples to 16-bit PCM
            const pcmData = new Int16Array(samples.length);
            for (let i = 0; i < samples.length; i++) {
                const s = Math.max(-1, Math.min(1, samples[i]));
                pcmData[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }

            // Encode to MP3 using lamejs
            const mp3encoder = new lamejs.Mp3Encoder(1, sampleRate, 128);
            const mp3Data = [];
            const sampleBlockSize = 1152;

            for (let i = 0; i < pcmData.length; i += sampleBlockSize) {
                const sampleChunk = pcmData.subarray(i, i + sampleBlockSize);
                const mp3buf = mp3encoder.encodeBuffer(sampleChunk);
                if (mp3buf.length > 0) {
                    mp3Data.push(mp3buf);
                }
            }

            const mp3buf = mp3encoder.flush();
            if (mp3buf.length > 0) {
                mp3Data.push(mp3buf);
            }

            return new Blob(mp3Data, { type: 'audio/mp3' });
        }

        async function tts() {
            const t = translations[currentLang] || translations['en'];
            const text = document.getElementById('text').value;
            const language = document.getElementById('interfaceLanguage').value;
            const speaker = document.getElementById('speaker').value;
            const result = document.getElementById('ttsResult');

            result.innerHTML = '';
            setStatus(true);
            updateProgress(30, t.genProgress);

            try {
                const resp = await fetch(getTTSUrl(), {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        text: text,
                        language: language,
                        speaker: speaker
                    })
                });

                updateProgress(70, t.genProgress);

                if (!resp.ok) {
                    result.innerHTML = "Error: " + await resp.text();
                    updateProgress(0);
                    setStatus(false);
                    return;
                }

                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);

                updateProgress(100, t.genProgress);

                // Convert to MP3
                const mp3Blob = await convertWavToMp3(blob);
                const mp3Url = URL.createObjectURL(mp3Blob);

                setTimeout(() => updateProgress(0), 2000);

                result.innerHTML = `
      <audio controls src="${url}" style="width: 100%; margin-bottom: 1rem;"></audio>
      <div style="display: flex; gap: 1rem;">
        <a href="${url}" download="voice_${language}_${speaker}.wav" style="color: #58a6ff; text-decoration: none; flex: 1; text-align: center; padding: 0.5rem; background: #21262d; border-radius: 6px;">
          ${t.downloadWav}
        </a>
        <a href="${mp3Url}" download="voice_${language}_${speaker}.mp3" style="color: #58a6ff; text-decoration: none; flex: 1; text-align: center; padding: 0.5rem; background: #21262d; border-radius: 6px;">
          ${t.downloadMp3}
        </a>
      </div>
    `;
                setStatus(false);
            } catch (e) {
                console.error('TTS Error:', e);
                result.innerHTML = t.connError;
                updateProgress(0);
                setStatus(false);
            }
        }

        // Check service health on page load
        window.addEventListener('DOMContentLoaded', () => {
            checkServiceHealth();
        });
    </script>
